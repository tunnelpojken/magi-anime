name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libmpv-dev mpv
      - name: Build Linux
        run: flutter build linux --release
      - name: Package
        run: tar -czf magi_anime-linux-x64.tar.gz -C build/linux/x64/release bundle/
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: magi_anime-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Build Windows
        run: flutter build windows --release
      - name: Package
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath magi_anime-windows-x64.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: magi_anime-windows-x64.zip
